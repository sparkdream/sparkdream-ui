---
version: "2.0"

services:
  web:
    image: sparkdreamnft/sparkdream-ui:v1.0.0
    expose:
      - port: 3000
        as: 80
        accept:
          - app-test.sparkdream.io
        to:
          - global: true
    env:
      # Runtime config — read by /api/config and the LCD proxy at request time,
      # so denom/endpoint changes only need a deployment update, not a rebuild.
      # The NEXT_PUBLIC_* variants are inlined at build time and would not pick
      # up edits made here, so they are intentionally not used in the SDL.
      - CHAIN_ID=sparkdream-test-1
      - LCD_ENDPOINT=https://api-test.sparkdream.io
      - RPC_ENDPOINT=https://rpc-test.sparkdream.io
      - CHAIN_DENOM=uspark.sparkdreamtest
      - DISPLAY_DENOM=SPARK
      - BECH32_PREFIX=sprkdrm
      - CHAIN_NAME=Spark Dream
      # Optional: point at a manifests.json hosted in object storage
      # (4everland / R2 / S3) so new snapshots become visible by uploading
      # files — no redeploy. Set after running `npm run snapshot:upload`.
      # The bucket must CORS-allow this deployment's hostname — see
      # deploy/s3-cors.json for a sample policy.
      # - REMOTE_MANIFEST_URL=https://my-bucket.4everbucket.com/manifests.json

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    dcloud:
      pricing:
        web:
          denom: uact
          amount: 1000

deployment:
  web:
    dcloud:
      profile: web
      count: 1
