---
version: "2.0"

services:
  web:
    image: sparkdreamnft/sparkdream-ui:v1.0.0
    expose:
      - port: 3000
        as: 80
        accept:
          - app-test.sparkdream.io
        to:
          - global: true
    env:
      - NEXT_PUBLIC_CHAIN_ID=sparkdream-test-1
      - NEXT_PUBLIC_LCD_ENDPOINT=https://api-test.sparkdream.io
      - NEXT_PUBLIC_RPC_ENDPOINT=https://rpc-test.sparkdream.io
      - NEXT_PUBLIC_DENOM=uspark
      - NEXT_PUBLIC_DISPLAY_DENOM=SPARK
      - NEXT_PUBLIC_BECH32_PREFIX=sprkdrm
      - NEXT_PUBLIC_CHAIN_NAME=Spark Dream
      # Optional: point at a manifests.json hosted in object storage
      # (4everland / R2 / S3) so new snapshots become visible by uploading
      # files — no redeploy. Set after running `npm run snapshot:upload`.
      # The bucket must CORS-allow this deployment's hostname — see
      # deploy/s3-cors.json for a sample policy.
      # - NEXT_PUBLIC_REMOTE_MANIFEST_URL=https://my-bucket.4everbucket.com/manifests.json

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    dcloud:
      pricing:
        web:
          denom: uact
          amount: 1000

deployment:
  web:
    dcloud:
      profile: web
      count: 1
